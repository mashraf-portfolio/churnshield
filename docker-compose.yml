version: "3.9"

services:
  api-server:
    build:
      context: .
      target: api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./models:/app/models:ro
    restart: unless-stopped

  streamlit:
    build:
      context: .
      target: dashboard
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - api-server
    restart: unless-stopped
