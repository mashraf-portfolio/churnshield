services:
  api-server:
    build:
      context: .
      target: api
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=/app/models/churnshield_model.joblib
      - PREPROCESSOR_PATH=/app/models/preprocessor.joblib
      - METADATA_PATH=/app/models/metadata.json
      - PREDICTION_LOG_PATH=/app/data/prediction_log.csv
      - CONFIG_PATH=/app/config/model_config.yaml
    volumes:
      - ./models:/app/models:ro
      - ./data:/app/data
    restart: unless-stopped

  streamlit:
    build:
      context: .
      target: dashboard
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api-server:8000
    depends_on:
      - api-server
    restart: unless-stopped
